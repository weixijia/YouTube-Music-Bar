name: YouTubeMusicBar
options:
  bundleIdPrefix: com.youtubemusicbar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  YouTubeMusicBar:
    type: application
    platform: macOS
    sources:
      - path: YouTubeMusicBar
        excludes:
          - "Resources/Info.plist"
          - "Resources/YouTubeMusicBar.entitlements"
    info:
      path: YouTubeMusicBar/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "2"
    entitlements:
      path: YouTubeMusicBar/Resources/YouTubeMusicBar.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youtubemusicbar.app
        PRODUCT_NAME: "YouTube Music Bar"
        INFOPLIST_FILE: YouTubeMusicBar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: YouTubeMusicBar/Resources/YouTubeMusicBar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
    dependencies: []
    scheme:
      testTargets:
        - YouTubeMusicBarTests

  YouTubeMusicBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: YouTubeMusicBarTests
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/YouTube Music Bar.app/Contents/MacOS/YouTube Music Bar"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: YouTubeMusicBar
