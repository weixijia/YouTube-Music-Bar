name: YtbMusicBar
options:
  bundleIdPrefix: com.ytbmusicbar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  YtbMusicBar:
    type: application
    platform: macOS
    sources:
      - path: YtbMusicBar
        excludes:
          - "Resources/Info.plist"
          - "Resources/YtbMusicBar.entitlements"
    info:
      path: YtbMusicBar/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "2"
    entitlements:
      path: YtbMusicBar/Resources/YtbMusicBar.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytbmusicbar.app
        PRODUCT_NAME: "Ytb Music Bar"
        INFOPLIST_FILE: YtbMusicBar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: YtbMusicBar/Resources/YtbMusicBar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
    dependencies: []
    scheme:
      testTargets:
        - YtbMusicBarTests

  YtbMusicBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: YtbMusicBarTests
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ytb Music Bar.app/Contents/MacOS/Ytb Music Bar"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: YtbMusicBar
